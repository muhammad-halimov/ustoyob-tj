framework:
    rate_limiter:
        # 5 попыток входа в минуту с одного IP
        api_login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'

        # 3 запроса OTP за 5 минут с одного IP
        api_otp_send:
            policy: 'fixed_window'
            limit: 3
            interval: '5 minutes'

        # 10 попыток подтверждения аккаунта в час с одного IP
        api_confirm_account:
            policy: 'fixed_window'
            limit: 10
            interval: '1 hour'

        # 5 создания тикетов в час с одного IP
        # Защита от спама анонимных обращений в техподдержку
        api_guest_ticket:
            policy: 'sliding_window'
            limit: 5
            interval: '1 hour'
