lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600

    blocklist_token:
        enabled: true
        cache: block_list_token_cache_pool

    # Токен принимается ТОЛЬКО из заголовка Authorization: Bearer <token>.
    # Query-параметр отключён: токен в URL попадает в логи сервера,
    # историю браузера и заголовок Referer третьих сторон.
    # Для Mercure/SSE используйте отдельный Mercure subscriber JWT.
    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
        query_parameter:
            enabled: false
            name: authorization
