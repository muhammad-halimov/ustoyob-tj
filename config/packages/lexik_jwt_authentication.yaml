lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600

    blocklist_token:
        enabled: true
        cache: block_list_token_cache_pool

    # EventSource не поддерживает кастомные заголовки, поэтому SSE-эндпоинты
    # передают JWT через query-параметр ?authorization=TOKEN
    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
        query_parameter:
            enabled: true
            name: authorization
